{% extends 'errores/base.html' %}

{% block title %}Eliminar {{ tipo }}{% endblock %}

{% block content %}
<a href="{{ volver_url }}" class="btn btn-sm btn-outline-secondary mb-3">
    <i class="bi bi-arrow-left"></i> Volver
</a>

<div class="card shadow-sm border-danger">
    <div class="card-header bg-danger text-white"><i class="bi bi-trash"></i> Eliminar {{ tipo }}</div>
    <div class="card-body">
        <p>Confirma que quieres eliminar <strong>{{ objeto }}</strong>.</p>
        <form method="post">
            {% csrf_token %}
            <div class="d-flex justify-content-end gap-2">
                <a href="{{ volver_url }}" class="btn btn-outline-secondary">Cancelar</a>
                <button type="submit" class="btn btn-danger">
                    <i class="bi bi-trash"></i> Eliminar
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
